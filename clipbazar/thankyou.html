<!DOCTYPE html>
<html lang="hi">
<head>
/></noscript>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#f5f7fb;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:#111;
}

/* CARD */
.card{
  background:#fff;
  padding:35px 28px;
  border-radius:14px;
  max-width:380px;
  width:100%;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* ICON */
.icon{
  width:60px;height:60px;
  margin:0 auto 18px;
  background:#22c55e;
  color:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}

/* TITLE */
.title{
  font-size:22px;
  font-weight:700;
  margin-bottom:8px;
}

/* TEXT */
.sub{
  font-size:14px;
  color:#555;
  margin-bottom:22px;
  line-height:1.5;
}

/* BUTTON */
.btn{
  display:block;
  background:#111;
  color:#fff;
  text-decoration:none;
  padding:14px;
  border-radius:8px;
  font-weight:600;
  transition:.2s;
}

.btn:hover{
  background:#333;
}

/* COUNTDOWN */
.count{
  margin-top:12px;
  font-size:12px;
  color:#777;
}
</style>
</head>

<body>

<div class="card">

  <div class="icon">✔</div>

  <div class="title">Order Confirm हो गया</div>

  <div class="sub">
    आपका Bundle WhatsApp पर मिलेगा।<br>
    नीचे क्लिक करके Channel Join करें।
  </div>

  <a href="https://whatsapp.com/channel/0029Vb81hNq4Spk9A6nqCl1a" class="btn">
    Join WhatsApp Channel
  </a>

  <div class="count">
    ⏱️ <span id="t">10</span> sec में redirect
  </div>

</div>

<script>
let t=10;
setInterval(()=>{
  t--;
  document.getElementById("t").innerText=t;
  if(t<=0){
    window.location.href="https://whatsapp.com/channel/0029Vb81hNq4Spk9A6nqCl1a";
  }
},1000);
</script>

</body>
</html>
